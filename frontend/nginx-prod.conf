# /frontend/nginx-prod.conf
server {
    listen 80;
    server_name dersaadet.seedhr.com.tr;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy - Containers talk to each other by service name
    location /upload {
        proxy_pass http://api:8088/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M;
    }

    location /job {
        proxy_pass http://api:8088/job;
        proxy_set_header Host $host;
    }

    location /result {
        proxy_pass http://api:8088/result;
        proxy_set_header Host $host;
    }
}
